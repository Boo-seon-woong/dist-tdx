mode: cn
transport: rdma
replication: 1
tdx: off
cache: on
mn_memory_size: 64MB
node_id: 100
encryption_key_hex: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
rdma_bootstrap: tcp
rdma_control_mode: write_imm
rdma_data_mode: rpc
rdma_skip_hello: on
# Same-host smoke test on the run_td host.
# Example: run_td --tcp-hostfwd-ports 7301
mn_endpoint: 127.0.0.1:7301
# rdma_device must be the local RDMA device name on the run_td host.
rdma_device: mlx5_0
rdma_gid_index: 0
rdma_port_num: 1
