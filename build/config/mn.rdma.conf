mode: mn
transport: rdma
replication: 1
tdx: on
cache: on
mn_memory_size: 16GB
encryption_key_hex: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
# listen_host/listen_port are the TCP bootstrap/control listener for RDMA QP setup.
listen_host: 192.168.80.3
listen_port: 7301
node_id: 0
memory_file: /tmp/dist-td-mn1-rdma.dat
prime_slots:
cache_slots:
backup_slots:
# rdma_device may be a verbs device (mlx5_0) or a netdev alias (ibp1s0, ibs3).
rdma_device: ibp111s0
rdma_gid_index: 0
rdma_port_num: 1
