mode: cn
transport: rdma
replication: 1
tdx: off
cache: off
mn_memory_size: 64MB
node_id: 100
encryption_key_hex: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
rdma_bootstrap: tcp
# With run_td --tcp-hostfwd-ports 7301, the host CN reaches the guest listener via localhost:7301.
mn_endpoint: 127.0.0.1:7301
# rdma_device is local to this CN process and usually differs from the guest MN.
rdma_device: ibs3
rdma_gid_index: 0
rdma_port_num: 1
