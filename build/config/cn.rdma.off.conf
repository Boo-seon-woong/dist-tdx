mode: cn
transport: rdma
replication: 1
tdx: off
cache: off
mn_memory_size: 64MB
node_id: 100
encryption_key_hex: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
rdma_bootstrap: tcp
# For an external CN, use the run_td host's reachable management IP.
# Example: run_td --tcp-hostfwd-ports 7301 --tcp-hostfwd-bind-addr 10.20.26.87
mn_endpoint: 10.20.26.87:7301
# rdma_device must be the external CN server's local verbs/netdev name.
rdma_device: mlx5_0
rdma_gid_index: 0
rdma_port_num: 1
