mode: mn
transport: rdma
replication: 1
tdx: on
cache: off
mn_memory_size: 16GB
encryption_key_hex: "00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff"
rdma_bootstrap: file
# rdma_oob_dir must point to the same shared directory on both CN and MN.
rdma_oob_dir: /shared/dist-tdx-rdma-oob
node_id: 0
memory_file: /tmp/dist-td-mn1-rdma.dat
prime_slots:
cache_slots:
backup_slots:
# rdma_device may be a verbs device (mlx5_0) or a netdev alias (ibp1s0, ibs3).
rdma_device: ibp111s0
rdma_gid_index: 0
rdma_port_num: 1
